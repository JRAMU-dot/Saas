<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="dashboard-container">
        <h1>Dashboard</h1>
        <div id="chat-area">
            <h2>Chat Area</h2>
            <div id="chat-window">
                <!-- Chat messages will be displayed here -->
            </div>
            <input type="text" id="chat-input" placeholder="Type your message...">
            <button id="send-button">Send</button>
        </div>
        <div id="plan-info">
            <h2>Your Plan</h2>
            <p><strong>Plan Name:</strong> Basic</p>
            <p><strong>Monthly Cost:</strong> $10</p>
            <p><strong>Next Billing Date:</strong> 2026-05-01</p>
        </div>
        <div id="upgrade-options">
            <h2>Upgrade Options</h2>
            <button id="upgrade-basic">Upgrade to Standard - $20/month</button>
            <button id="upgrade-standard">Upgrade to Premium - $30/month</button>
        </div>
    </div>
</body>
</html>
